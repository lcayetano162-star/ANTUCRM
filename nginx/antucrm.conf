# ============================================
# ANTU CRM - Nginx Config para antucrm.com
# Despliegue manual con PM2 + Archivos estáticos
# ============================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# Upstream del backend (PM2 en puerto 3000)
upstream antu_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Redirigir HTTP a HTTPS
server {
    listen 80;
    server_name antucrm.com www.antucrm.com;
    return 301 https://$host$request_uri;
}

# Servidor HTTPS principal
server {
    listen 443 ssl http2;
    server_name antucrm.com www.antucrm.com;

    # ================================================
    # SSL - Ajustar rutas según tu certificado
    # Si usas Let's Encrypt / Certbot:
    # ================================================
    ssl_certificate /etc/letsencrypt/live/antucrm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/antucrm.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ================================================
    # Seguridad
    # ================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Tamaño máximo de upload
    client_max_body_size 50M;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ================================================
    # Frontend (archivos estáticos de Vite/React)
    # ================================================
    root /var/www/antucrm/frontend;
    index index.html;

    # Archivos estáticos con cache largo (tienen hash en el nombre)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ================================================
    # API Backend - Auth (rate limit estricto)
    # ================================================
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://antu_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # ================================================
    # API Backend - Todas las rutas /api/
    # ================================================
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://antu_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # ================================================
    # Health check del backend
    # ================================================
    location /health {
        proxy_pass http://antu_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ================================================
    # Frontend SPA - Fallback para React Router
    # ================================================
    location / {
        try_files $uri $uri/ /index.html;
    }
}
