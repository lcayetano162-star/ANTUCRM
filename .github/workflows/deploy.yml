# ============================================================
# ANTU CRM - CI/CD Pipeline
# GitHub Actions - Deploy Automático a Producción
# ============================================================
# Este pipeline:
# 1. Valida el código (lint, build, tests)
# 2. Verifica archivos de configuración
# 3. Construye imágenes Docker
# 4. Despliega al servidor vía SSH
# ============================================================

name: 🚀 ANTU CRM - Deploy to Production

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================================
  # JOB 1: Validación de Código
  # ==========================================================
  validate:
    name: ✅ Validar Código
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: 📦 Instalar dependencias API
        working-directory: ./api
        run: |
          echo "📦 Verificando package-lock.json..."
          if [ ! -f package-lock.json ]; then
            echo "❌ ERROR: package-lock.json no existe"
            echo "💡 Ejecuta 'npm install' localmente y sube los cambios"
            exit 1
          fi
          npm ci

      - name: 🔍 Verificar archivos críticos
        run: |
          echo "🔍 Verificando archivos de configuración..."
          
          # Lista de archivos requeridos
          required_files=(
            "api/Dockerfile"
            "api/.dockerignore"
            "api/tsconfig.json"
            "api/tsconfig.build.json"
            "api/package.json"
            "api/package-lock.json"
            "docker-compose.yml"
          )
          
          missing=0
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "  ✅ $file"
            else
              echo "  ❌ $file NO EXISTE"
              missing=$((missing + 1))
            fi
          done
          
          if [ $missing -gt 0 ]; then
            echo ""
            echo "❌ Faltan $missing archivos requeridos"
            exit 1
          fi
          
          echo ""
          echo "✅ Todos los archivos críticos existen"

      - name: 🏗️ Build API
        working-directory: ./api
        run: |
          echo "🏗️ Compilando TypeScript..."
          npm run build
          
          if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
            echo "❌ ERROR: Build no generó archivos en dist/"
            exit 1
          fi
          
          echo "✅ Build exitoso"
          echo "📁 Archivos generados:"
          ls -la dist/

      - name: 🔐 Verificar secrets requeridos
        run: |
          echo "🔐 Verificando configuración de secrets..."
          
          required_secrets=(
            "SSH_PRIVATE_KEY"
            "SERVER_HOST"
            "SERVER_USER"
            "DATABASE_URL"
            "JWT_SECRET"
            "ENCRYPTION_KEY"
          )
          
          missing=0
          for secret in "${required_secrets[@]}"; do
            if [ -n "${!secret}" ]; then
              echo "  ✅ $secret configurado"
            else
              echo "  ⚠️ $secret NO configurado (se necesitará en deploy)"
            fi
          done

  # ==========================================================
  # JOB 2: Construcción de Imágenes Docker
  # ==========================================================
  build:
    name: 🐳 Construir Imágenes Docker
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build y Push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: 📤 Upload docker-compose.yml como artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-files
          path: |
            docker-compose.yml
            nginx/

  # ==========================================================
  # JOB 3: Despliegue a Servidor
  # ==========================================================
  deploy:
    name: 🚀 Deploy a Producción
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    environment:
      name: production
      url: http://${{ secrets.SERVER_HOST }}

    steps:
      - name: 📥 Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-files

      - name: 🔐 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🚀 Deploy via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          echo "🚀 Iniciando despliegue a $SERVER_HOST..."
          
          # Crear script de deploy en el servidor
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST << 'REMOTE_SCRIPT'
            set -e
            
            echo "=========================================="
            echo "🚀 ANTU CRM - Deploy Script"
            echo "=========================================="
            
            # Directorio de la aplicación
            APP_DIR="/opt/antucrm"
            mkdir -p $APP_DIR
            cd $APP_DIR
            
            # Backup antes de actualizar
            echo "💾 Creando backup..."
            if [ -d "api/src" ]; then
              BACKUP_DIR="/opt/backups/antucrm-$(date +%Y%m%d-%H%M%S)"
              mkdir -p $BACKUP_DIR
              cp -r api/src $BACKUP_DIR/ 2>/dev/null || true
              echo "✅ Backup creado en $BACKUP_DIR"
            fi
            
            # Detener servicios actuales
            echo "🛑 Deteniendo servicios actuales..."
            docker-compose down --remove-orphans 2>/dev/null || true
            
            # Limpiar contenedores e imágenes antiguas
            echo "🧹 Limpiando recursos antiguos..."
            docker system prune -f
            
            # Verificar que puertos estén libres
            echo "🔍 Verificando puertos..."
            for port in 3000 3001 5432; do
              if lsof -Pi :$port -sTCP:LISTEN -t >/dev/null 2>&1; then
                echo "⚠️ Puerto $port ocupado, intentando liberar..."
                sudo lsof -ti:$port | xargs sudo kill -9 2>/dev/null || true
              fi
            done
            
            echo "✅ Puertos libres"
          REMOTE_SCRIPT

      - name: 📤 Copiar archivos al servidor
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          echo "📤 Copiando archivos..."
          
          # Crear estructura temporal
          mkdir -p deploy_temp/api
          
          # Copiar archivos necesarios
          cp docker-compose.yml deploy_temp/
          cp -r nginx deploy_temp/ 2>/dev/null || true
          
          # SCP al servidor
          scp -o StrictHostKeyChecking=no -r deploy_temp/* $SERVER_USER@$SERVER_HOST:/opt/antucrm/

      - name: 🏃‍♂️ Iniciar servicios
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
          SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
        run: |
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST << REMOTE_SCRIPT
            set -e
            
            cd /opt/antucrm
            
            # Crear archivo .env con secrets
            echo "🔐 Configurando variables de entorno..."
            cat > .env << EOF
            # Auto-generated by GitHub Actions
            # Date: $(date)
            
            DATABASE_URL=${DATABASE_URL}
            JWT_SECRET=${JWT_SECRET}
            ENCRYPTION_KEY=${ENCRYPTION_KEY}
            SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL}
            SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD}
            FRONTEND_URL=${FRONTEND_URL}
            CORS_ORIGIN=${CORS_ORIGIN}
            API_URL=http://localhost:3001
            NODE_ENV=production
            PORT=3001
            EMAIL_WORKER_ENABLED=true
            EOF
            
            chmod 600 .env
            
            # Iniciar con nuevas imágenes
            echo "🏃‍♂️ Iniciando servicios..."
            docker-compose pull
            docker-compose up -d --remove-orphans
            
            # Esperar a que API esté saludable
            echo "⏳ Esperando healthcheck..."
            sleep 30
            
            # Verificar estado
            echo "🔍 Verificando despliegue..."
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "✅ API está saludable"
            else
              echo "❌ API no responde"
              docker-compose logs api --tail=50
              exit 1
            fi
            
            echo ""
            echo "=========================================="
            echo "✅ DEPLOY EXITOSO"
            echo "=========================================="
            echo "URL: ${FRONTEND_URL}"
            echo "Hora: $(date)"
          REMOTE_SCRIPT

      - name: 🔔 Notificar resultado
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Deploy ANTU CRM: ${{ job.status }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 ANTU CRM - Deploy ${{ job.status }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Commit:*\n${{ github.sha }}"},
                    {"type": "mrkdwn", "text": "*Autor:*\n${{ github.actor }}"},
                    {"type": "mrkdwn", "text": "*Servidor:*\n${{ secrets.SERVER_HOST }}"},
                    {"type": "mrkdwn", "text": "*Fecha:*\n$(date)"}
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

  # ==========================================================
  # JOB 4: Verificación Post-Deploy
  # ==========================================================
  verify:
    name: ✅ Verificar Despliegue
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    
    steps:
      - name: 🔍 Health Check
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          echo "🔍 Verificando endpoints..."
          
          MAX_RETRIES=10
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -sf http://$SERVER_HOST/api/health > /dev/null 2>&1; then
              echo "✅ API respondiendo correctamente"
              exit 0
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "⏳ Intento $RETRY_COUNT/$MAX_RETRIES..."
            sleep 10
          done
          
          echo "❌ API no responde después de $MAX_RETRIES intentos"
          exit 1
