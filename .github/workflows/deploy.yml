name: Deploy ANTU CRM

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Deploy
        run: |
          SERVER="${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"
          
          ssh -o StrictHostKeyChecking=no -T $SERVER "mkdir -p /opt/antucrm"
          
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ $SERVER:/opt/antucrm/
          
          ssh -o StrictHostKeyChecking=no -T $SERVER "cd /opt/antucrm && docker-compose down 2>/dev/null || true"
          ssh -o StrictHostKeyChecking=no -T $SERVER "cd /opt/antucrm && docker-compose up -d --build"
