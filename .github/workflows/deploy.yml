name: Deploy ANTU CRM

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 161.35.139.197 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy
        run: |
          echo "🚀 Iniciando deploy a 161.35.139.197..."
          
          # 1. Crear directorio en servidor
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@161.35.139.197 "mkdir -p /opt/antucrm"
          
          # 2. Copiar archivos (excluyendo node_modules y git)
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" \
            ./ root@161.35.139.197:/opt/antucrm/
          
          # 3. Ejecutar docker-compose en servidor
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@161.35.139.197 "
            cd /opt/antucrm && \
            docker-compose down 2>/dev/null || true && \
            docker-compose up -d --build
          "
          
          echo "✅ Deploy completado"
