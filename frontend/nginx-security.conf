# ═══════════════════════════════════════════════════════════════════════════════
# ANTÜ CRM - NGINX SECURITY CONFIGURATION
# Enterprise-grade security headers and hardening
# ═══════════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════════
# SECURITY HEADERS
# ═══════════════════════════════════════════════════════════════════════════════

# Content Security Policy
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.antucrm.com https://*.antucrm.com; media-src 'self'; object-src 'none'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

# X-Frame-Options - Prevent clickjacking
add_header X-Frame-Options "DENY" always;

# X-Content-Type-Options - Prevent MIME sniffing
add_header X-Content-Type-Options "nosniff" always;

# X-XSS-Protection - Legacy XSS protection (deprecated but still useful)
add_header X-XSS-Protection "1; mode=block" always;

# Referrer Policy - Control referrer information
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy - Restrict browser features
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), display-capture=(), document-domain=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(), gamepad=(), identity-credentials-get=(), idle-detection=(), local-fonts=(), midi=(), navigation-override=(), otp-credentials=(), picture-in-picture=(), publickey-credentials-create=(), publickey-credentials-get=(), screen-wake-lock=(), serial=(), speaker-selection=(), storage-access=(), web-share=(), window-management=(), xr-spatial-tracking=()" always;

# Strict Transport Security (HSTS) - Force HTTPS
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# X-DNS-Prefetch-Control - Disable DNS prefetching
add_header X-DNS-Prefetch-Control "off" always;

# X-Download-Options - Prevent IE from executing downloads
add_header X-Download-Options "noopen" always;

# X-Permitted-Cross-Domain-Policies - Restrict Flash/PDF
add_header X-Permitted-Cross-Domain-Policies "none" always;

# Cache Control - Prevent caching of sensitive data
add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
add_header Pragma "no-cache" always;
add_header Expires "0" always;

# Remove server information
server_tokens off;

# ═══════════════════════════════════════════════════════════════════════════════
# RATE LIMITING
# ═══════════════════════════════════════════════════════════════════════════════

# Limit requests per IP
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

# Limit connections per IP
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ═══════════════════════════════════════════════════════════════════════════════
# SSL/TLS CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

# SSL protocols (only TLS 1.2 and 1.3)
ssl_protocols TLSv1.2 TLSv1.3;

# SSL ciphers (strong only)
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

# Prefer server ciphers
ssl_prefer_server_ciphers off;

# SSL session parameters
ssl_session_timeout 1d;
ssl_session_cache shared:SSL:50m;
ssl_session_tickets off;

# OCSP Stapling
ssl_stapling on;
ssl_stapling_verify on;

# ═══════════════════════════════════════════════════════════════════════════════
# SERVER BLOCK
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name _;
    
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;
    
    # SSL certificates (update paths)
    ssl_certificate /etc/ssl/certs/antucrm.crt;
    ssl_certificate_key /etc/ssl/private/antucrm.key;
    
    # Root directory
    root /var/www/antucrm;
    index index.html;
    
    # ═══════════════════════════════════════════════════════════════════════════
    # SECURITY LOCATIONS
    # ═══════════════════════════════════════════════════════════════════════════
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
    
    # Deny access to backup files
    location ~* \.(bak|backup|swp|old|orig|save)$ {
        deny all;
        return 404;
    }
    
    # Deny access to sensitive files
    location ~* \.(env|config|ini|log|sql|sqlite)$ {
        deny all;
        return 404;
    }
    
    # Deny access to version control
    location ~* /\.(git|svn|hg|bzr|cvs) {
        deny all;
        return 404;
    }
    
    # ═══════════════════════════════════════════════════════════════════════════
    # RATE LIMITING APPLICATION
    # ═══════════════════════════════════════════════════════════════════════════
    
    # API endpoints - stricter rate limiting
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_conn addr 10;
        
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Login endpoint - very strict rate limiting
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_conn addr 5;
        
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # General rate limiting for all other requests
    location / {
        limit_req zone=general burst=20 nodelay;
        limit_conn addr 20;
        
        try_files $uri $uri/ /index.html;
    }
    
    # ═══════════════════════════════════════════════════════════════════════════
    # STATIC FILES CACHING
    # ═══════════════════════════════════════════════════════════════════════════
    
    # JavaScript and CSS files - cache for 1 year (versioned)
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # Images - cache for 30 days
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
    
    # Fonts - cache for 1 year
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
    }
    
    # ═══════════════════════════════════════════════════════════════════════════
    # GZIP COMPRESSION
    # ═══════════════════════════════════════════════════════════════════════════
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
}

# ═══════════════════════════════════════════════════════════════════════════════
# UPSTREAM BACKEND (if applicable)
# ═══════════════════════════════════════════════════════════════════════════════

upstream backend {
    server 127.0.0.1:3000;
    keepalive 32;
}
